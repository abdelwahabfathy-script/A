<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6750A4" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Rounded Base Background (Maskable) -->
  <rect width="512" height="512" rx="112" fill="url(#purpleGrad)" />
  
  <!-- Vector Graphic: Clapperboard & Screenplay Sheet -->
  <g filter="url(#shadow)" transform="translate(96, 96)">
    <!-- Main Slate Board -->
    <rect x="20" y="80" width="280" height="180" rx="16" fill="#111111" />
    
    <!-- Top Bar -->
    <rect x="20" y="44" width="280" height="36" fill="#1E1E1E" />
    
    <!-- Clapper Stripes -->
    <path d="M40 44 h24 l-24 36 h-24 z" fill="#FFFFFF" />
    <path d="M100 44 h24 l-24 36 h-24 z" fill="#FFFFFF" />
    <path d="M160 44 h24 l-24 36 h-24 z" fill="#FFFFFF" />
    <path d="M220 44 h24 l-24 36 h-24 z" fill="#FFFFFF" />
    <path d="M280 44 h20 l-20 36 h-20 z" fill="#FFFFFF" />
    
    <!-- Hinge -->
    <circle cx="20" cy="50" r="8" fill="#555555" />
    
    <!-- SW Monogram -->
    <text x="160" y="195" font-family="'Cairo', 'Inter', sans-serif" font-size="82" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">SW</text>
    
    <!-- Subtle script edit lines underneath -->
    <rect x="70" y="215" width="180" height="10" rx="5" fill="#8B5CF6" opacity="0.6" />
  </g>
</svg>
